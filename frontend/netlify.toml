[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # VITE_* vars are intentionally public — Vite inlines them into the client
  # bundle at build time (the browser has to know the API URL and the Clerk
  # publishable key). Netlify's secrets scanner otherwise flags them as leaks.
  SECRETS_SCAN_OMIT_KEYS = "VITE_API_URL,VITE_CLERK_PUBLISHABLE_KEY"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
