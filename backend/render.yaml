services:
  - type: web
    name: miniharvey-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:$PORT main:app
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENV
        value: production

      # Cloudflare LLM
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false

      # Indian legal search
      - key: INDIAN_KANOON_API_TOKEN
        sync: false

      # Google Custom Search + YouTube Data API
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_CX
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false

      # Clerk auth
      - key: CLERK_SECRET_KEY
        sync: false

      # CORS — set this to your Netlify URL once the frontend is deployed
      - key: ALLOWED_ORIGINS
        sync: false
